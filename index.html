<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Edorin — Hero with Logo Bubbles</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

/* <-- IMPORTANT: leave room for the fixed nav so widgets/content don't sit under it --> */
body{
  font-family:Georgia, "Times New Roman", serif;
  background:#000;
  color:#fff;
  overflow-x:hidden;
  padding-top:56px; /* same as nav height - pushes page content below the fixed nav */
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:1200;background:rgba(0,0,0,0.85);
  border-bottom:3px solid #e6c34a;
}
.logo{display:flex;gap:10px;align-items:center;font-weight:700;font-size:18px;color:#fff}
.nav-links{display:flex;gap:18px}
.nav-links a{color:#fff;text-decoration:none;padding:6px}
.nav-links a.active{color:#ffcc00;border-bottom:3px solid #ffcc00;}

/* TradingView widget container adjustments so it's visible and below nav */
.tradingview-widget-container{
  position:relative;
  z-index:110; /* lower than nav z-index (1200) so nav overlays it */
  margin: 0 auto;
  max-width: 100%;
  background: transparent;
}

/* HERO */
.hero{
  position:relative;height:100vh;width:100%;
  display:flex;align-items:center;justify-content:center;text-align:center;padding:0 20px;
  background: url('assets/hero-bg.png') center center/cover no-repeat;
}
.hero::before{ content:"";position:absolute;inset:0; background:linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.45)); z-index:1; }
.hero-inner{position:relative;z-index:2;max-width:1200px;width:100%}
h1{font-size:64px;margin-bottom:12px;letter-spacing:1px;color:#fff;font-weight:900; text-shadow:0 6px 18px rgba(0,0,0,0.7)}
.tagline{font-size:20px;font-style:italic;color:#e9e9e9;margin-bottom:18px;opacity:0.95}

/* MAIN LEFT SKY BUBBLE (smaller and moved left) */
.logo-bubble {
  position:absolute; top:15%; left:16%;
  transform:translateX(-50%);
  width:110px; height:110px; border-radius:50%;
  background:rgba(12,12,15,0.28); backdrop-filter:blur(4px);
  border:1px solid rgba(255,204,0,0.07);
  box-shadow:0 6px 18px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
  display:flex;align-items:center;justify-content:center;overflow:hidden;z-index:3;cursor:pointer;
}
.logo-bubble::after{content:"";position:absolute;inset:-6px;border-radius:50%;box-shadow:0 0 30px rgba(255,200,60,0.06);pointer-events:none}
.bubble-img{ width:72%;height:72%;object-fit:contain;opacity:0;transform:scale(.8);transition: transform .45s cubic-bezier(.2,.9,.3,1), opacity .45s; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.6)); }
.bubble-img.show{opacity:1;transform:scale(1);}

/* POP animation for main bubble when it changes */
.pop { animation: popAnim .42s ease; }
@keyframes popAnim { 0%{ transform: translateX(-50%) scale(.85); opacity:.0 } 60%{ transform: translateX(-50%) scale(1.08); opacity:1 } 100%{ transform: translateX(-50%) scale(1) } }

/* SIDE COLUMNS */
.side-column{ position:absolute; top:12%; bottom:12%; width:78px; display:flex; flex-direction:column; align-items:center; justify-content:space-between; z-index:2; pointer-events:none; }
.side-column.left{ left:12px }
.side-column.right{ right:12px }
.side-bubble{ width:60px;height:60px;border-radius:50%; background:linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.04); display:flex;align-items:center;justify-content:center;opacity:.95; box-shadow:0 8px 22px rgba(0,0,0,0.45); transform:translateY(0); animation: floatUpDown 6s ease-in-out infinite; overflow:hidden; }
/* tiny logo inside each side bubble */
.side-bubble img{ width:62%; height:62%; object-fit:contain; opacity:0; transform:scale(.85); transition:opacity .45s, transform .45s; filter: drop-shadow(0 4px 12px rgba(0,0,0,.5)); }
.side-bubble img.show{ opacity:1; transform:scale(1); }

/* stagger delays so they float asynchronously */
.side-column.left .side-bubble:nth-child(1){ animation-delay:0s }
.side-column.left .side-bubble:nth-child(2){ animation-delay:.6s }
.side-column.left .side-bubble:nth-child(3){ animation-delay:1.3s }
.side-column.left .side-bubble:nth-child(4){ animation-delay:2s }
.side-column.left .side-bubble:nth-child(5){ animation-delay:2.7s }
.side-column.right .side-bubble:nth-child(1){ animation-delay:.4s }
.side-column.right .side-bubble:nth-child(2){ animation-delay:1.1s }
.side-column.right .side-bubble:nth-child(3){ animation-delay:1.8s }
.side-column.right .side-bubble:nth-child(4){ animation-delay:2.5s }
.side-column.right .side-bubble:nth-child(5){ animation-delay:3.2s }

@keyframes floatUpDown { 0%{ transform:translateY(0) scale(1); opacity:.9 } 50%{ transform:translateY(-12px) scale(1.03); opacity:1 } 100%{ transform:translateY(0) scale(1); opacity:.9 } }

/* small glow and faint candlestick background inside side bubbles (optional) */
.mini-chart{ width:60%; height:60%; background: linear-gradient(transparent 60%, rgba(255,204,0,0.06) 60%), linear-gradient(90deg, transparent 70%, rgba(255,255,255,0.02) 70%); opacity:.45; border-radius:4px; transform:rotate(-8deg); }

/* scroll hint */
.scroll-down{ position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:6; color:#ffcc00; font-size:20px; opacity:0.95; text-shadow:0 3px 10px rgba(0,0,0,0.6); animation:bounce 2s infinite }
@keyframes bounce{ 0%,100%{ transform:translateX(-50%) translateY(0) } 50%{ transform:translateX(-50%) translateY(-8px) } }

@media (max-width:900px){ h1{ font-size:36px } .logo-bubble{ width:86px; height:86px; top:14% } .side-column{ display:none } }
</style>
</head>
<body>

<section class="hero">
  <div class="hero-inner">
    <h1>Edorin</h1>
    <p class="tagline">"Guiding traders through markets with timeless intelligence."</p>
  </div>
  <!-- MAIN LEFT SKY BUBBLE -->
  <div class="logo-bubble" id="mainBubble" title="click to advance">
    <img id="mainImg" class="bubble-img" src="" alt="logo" />
  </div>
  <!-- LEFT side bubbles -->
  <div class="side-column left" aria-hidden="true">
    <div class="side-bubble" data-index="0"><img src="" alt=""></div>
    <div class="side-bubble" data-index="1"><img src="" alt=""></div>
    <div class="side-bubble" data-index="2"><img src="" alt=""></div>
    <div class="side-bubble" data-index="3"><img src="" alt=""></div>
    <div class="side-bubble" data-index="4"><img src="" alt=""></div>
  </div>
  <!-- RIGHT side bubbles -->
  <div class="side-column right" aria-hidden="true">
    <div class="side-bubble" data-index="5"><img src="" alt=""></div>
    <div class="side-bubble" data-index="6"><img src="" alt=""></div>
    <div class="side-bubble" data-index="7"><img src="" alt=""></div>
    <div class="side-bubble" data-index="8"><img src="" alt=""></div>
    <div class="side-bubble" data-index="9"><img src="" alt=""></div>
  </div>
  <div class="scroll-down">⌄</div>
</section>

<script>
/* Use only the actual filenames that exist in your /assets/ folder (case-sensitive on GitHub Pages) */
const logos = [
  'assets/Ashok.png',
  'assets/ITC.png',
  'assets/LIC.png',
  'assets/RIL.png',
  'assets/SBI.png',
  'assets/Tata.png',
  'assets/ULTRA.png',
  'assets/hdfc.png',
  'assets/info.png'
];

console.log('logos array:', logos);

// Preload (best-effort)
logos.forEach(s => { const i=new Image(); i.src=s; });

// ---------------- Main bubble logic (4s cycle) ----------------
const mainImg = document.getElementById('mainImg');
const mainBubble = document.getElementById('mainBubble');
let mainIndex = 0;

// ensure .show only added after image loads successfully
function setMainSrc(src){
  mainImg.classList.remove('show');
  mainBubble.classList.remove('pop');
  if(!src) return;
  mainImg.onload = () => {
    mainBubble.classList.add('pop');
    void mainImg.offsetWidth;
    mainImg.classList.add('show');
  };
  mainImg.onerror = (e) => {
    console.warn('Main image failed to load:', src, e);
  };
  mainImg.src = src;
}

function showMain(idx){
  const src = logos[idx % logos.length] || '';
  setTimeout(()=> setMainSrc(src), 140);
}

showMain(mainIndex);

let mainInterval = setInterval(() => {
  mainIndex = (mainIndex + 1) % logos.length;
  showMain(mainIndex);
}, 4000);

// allow click to advance
mainBubble.addEventListener('click', () => {
  mainIndex = (mainIndex + 1) % logos.length;
  showMain(mainIndex);
});

// ---------------- Side bubbles logic ----------------
// Select the img nodes directly for simpler handling
const sideImgNodes = Array.from(document.querySelectorAll('.side-bubble img'));

sideImgNodes.forEach((img, i) => {
  let idx = (i * 2) % logos.length; // initial index per bubble
  const baseInterval = 2000 + (i * 250);

  function updateSide(){
    img.classList.remove('show');
    // swap source and only show after load
    const next = logos[idx % logos.length] || '';
    img.onload = () => { img.classList.add('show'); };
    img.onerror = (e) => { console.warn('Side image failed to load:', next, e); };
    img.src = next;
    idx = (idx + 1) % logos.length;
  }

  // initial staggered call
  setTimeout(updateSide, i * 300);
  // repeat with slight variation
  setInterval(updateSide, baseInterval);
});
</script>
