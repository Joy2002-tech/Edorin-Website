<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Edorin — Hero with Logo Bubbles</title>
<style>
  /* RESET */
  * { box-sizing: border-box; margin:0; padding:0; }
  html,body { height:100%; }
  body {
    font-family: Georgia, "Times New Roman", serif;
    background:#000;
    color: #fff;
    overflow-x:hidden;
  }

  /* NAV (simple) */
  nav{
    position:fixed; top:0; left:0; right:0; height:56px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; z-index:1200;
    background:rgba(0,0,0,0.85); border-bottom:3px solid #e6c34a;
  }
  .logo { display:flex; gap:10px; align-items:center; font-weight:700; font-size:18px; color:#fff; }
  .nav-links { display:flex; gap:18px; }
  .nav-links a { color:#fff; text-decoration:none; padding:6px; }
  .nav-links a.active { color:#ffcc00; border-bottom:3px solid #ffcc00; }

  /* HERO */
  .hero {
    position:relative;
    height:100vh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:0 20px;
    background: url('assets/hero-bg.png') center center/cover no-repeat; /* replace with your wizard image */
  }

  /* dark overlay to help text contrast */
  .hero::before{
    content:""; position:absolute; inset:0;
    background: linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.45));
    z-index:1;
  }

  .hero-inner{ position:relative; z-index:2; max-width:1200px; width:100%; }

  h1{
    font-size:64px; margin-bottom:12px;
    letter-spacing:1px; color:#fff; font-weight:900;
    text-shadow: 0 6px 18px rgba(0,0,0,0.7);
  }
  .tagline{ font-size:20px; font-style:italic; color:#e9e9e9; margin-bottom:18px; opacity:0.95; }

  /* main circular logo bubble in the sky */
.logo-bubble {
  position: absolute;
  top: 15%;   /* moved higher (was 20%) */
  left: 30%;  /* shifted a bit to the right so it’s not above the text */
  transform: translateX(-50%);
  width: 120px;   /* half size (was 240px) */
  height: 120px;  /* half size (was 240px) */
  border-radius: 50%;
  background: rgba(12,12,15,0.28);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,204,0,0.07);
  box-shadow: 0 6px 18px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.02);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  z-index: 3;
}

.bubble-img {
  width: 70%;  /* scaled down logo */
  height: 70%;
  object-fit: contain;
  opacity: 0;
  transform: scale(0.85);
  transition: opacity .8s ease, transform .8s ease;
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
}

  /* soft glow ring */
  .logo-bubble::after{
    content:""; position:absolute; inset:-8px;
    border-radius:50%;
    box-shadow: 0 0 40px rgba(255,200,60,0.08);
    pointer-events:none;
  }

  /* small floating bubbles on left & right margins */
  .side-column {
    position: absolute;
    top: 12%;
    bottom: 12%;
    width:72px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:space-between;
    z-index:2;
    pointer-events:none;
  }
  .side-column.left { left:18px; }
  .side-column.right { right:18px; }

  .side-bubble {
    width:54px; height:54px; border-radius:50%;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
    border:1px solid rgba(255,255,255,0.05);
    display:flex; align-items:center; justify-content:center;
    opacity:0.85;
    transform: translateY(0);
    animation: floatUpDown 6s ease-in-out infinite;
    box-shadow: 0 8px 20px rgba(0,0,0,0.45);
  }
  /* stagger animations */
  .side-column.left .side-bubble:nth-child(1){ animation-delay: 0s; }
  .side-column.left .side-bubble:nth-child(2){ animation-delay: 0.6s; }
  .side-column.left .side-bubble:nth-child(3){ animation-delay: 1.3s; }
  .side-column.left .side-bubble:nth-child(4){ animation-delay: 2s; }
  .side-column.left .side-bubble:nth-child(5){ animation-delay: 2.7s; }

  .side-column.right .side-bubble:nth-child(1){ animation-delay: 0.4s; }
  .side-column.right .side-bubble:nth-child(2){ animation-delay: 1.1s; }
  .side-column.right .side-bubble:nth-child(3){ animation-delay: 1.8s; }
  .side-column.right .side-bubble:nth-child(4){ animation-delay: 2.5s; }
  .side-column.right .side-bubble:nth-child(5){ animation-delay: 3.2s; }

  @keyframes floatUpDown {
    0% { transform: translateY(0) scale(1); opacity:0.9;}
    50%{ transform: translateY(-12px) scale(1.03); opacity:1;}
    100%{ transform: translateY(0) scale(1); opacity:0.9;}
  }

  /* optional: tiny candlestick-ish lines as decorative background in the side bubbles */
  .mini-chart {
    width:60%; height:60%;
    background:
      linear-gradient(transparent 60%, rgba(255,204,0,0.07) 60%),
      linear-gradient(90deg, transparent 70%, rgba(255,255,255,0.03) 70%);
    opacity:0.65;
    border-radius:4px;
    transform:rotate(-10deg);
  }

  /* scroll hint */
  .scroll-down {
    position:absolute; bottom:16px; left:50%; transform:translateX(-50%); z-index:6;
    color:#ffcc00; font-size:20px; opacity:0.95;
    text-shadow: 0 3px 10px rgba(0,0,0,0.6);
    animation: bounce 2s infinite;
  }
  @keyframes bounce { 0%,100%{ transform:translateX(-50%) translateY(0);} 50%{ transform:translateX(-50%) translateY(-8px);} }

  /* responsiveness */
  @media (max-width:900px){
    h1{ font-size:36px; }
    .logo-bubble{ width:170px; height:170px; top:18%; }
    .side-column{ display:none; } /* hide side bubbles on small screens */
  }
</style>
</head>
<body>

<nav>
  <div class="logo"><img src="assets/icon-32.png" alt="" style="width:28px;height:28px;border-radius:4px;"> Edorin</div>
  <div class="nav-links">
    <a href="#" class="active">Home</a>
    <a href="#">Products</a>
    <a href="#">Labs</a>
    <a href="#">About</a>
  </div>
</nav>

<section class="hero">
  <div class="hero-inner">
    <h1>Edorin</h1>
    <p class="tagline">"Guiding traders through markets with timeless intelligence."</p>
  </div>

  <!-- main sky bubble -->
  <div class="logo-bubble" id="logoBubble">
    <!-- one image element that will be swapped & animated -->
    <img id="bubbleImg" class="bubble-img" src="" alt="brand logo" />
  </div>

  <!-- left and right decorative columns -->
  <div class="side-column left" aria-hidden="true">
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
  </div>

  <div class="side-column right" aria-hidden="true">
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
    <div class="side-bubble"><div class="mini-chart"></div></div>
  </div>

  <div class="scroll-down">⌄</div>
</section>

<script>
  // LIST OF LOGO PNGs (place these files in /assets/)
  const logos = [
    'assets/logo-apple.png',
    'assets/logo-tcs.png',
    'assets/logo-reliance.png',
    'assets/logo-hdfc.png',
    'assets/logo-infotech.png',
    'assets/logo-nifty.png'
  ];

  // preload images
  const preloaded = [];
  logos.forEach(src => {
    const i = new Image();
    i.src = src;
    preloaded.push(i);
  });

  // core logic: change logo every 4 seconds with fade/scale
  const imgEl = document.getElementById('bubbleImg');
  let ix = 0;

  function showLogo(index) {
    // set src but hide first for animation
    imgEl.classList.remove('show');
    // small timeout to allow fade out before swapping
    setTimeout(() => {
      imgEl.src = logos[index];
      // force reflow then add class to trigger show transition
      void imgEl.offsetWidth;
      imgEl.classList.add('show');
    }, 220);
  }

  // initial show (ensure image exists)
  showLogo(ix);

  // cycle every 4 seconds
  setInterval(() => {
    ix = (ix + 1) % logos.length;
    showLogo(ix);
  }, 4000);

  // OPTIONAL: click the bubble to advance manually
  document.getElementById('logoBubble').addEventListener('click', () => {
    ix = (ix + 1) % logos.length;
    showLogo(ix);
  });
</script>

</body>
</html>
