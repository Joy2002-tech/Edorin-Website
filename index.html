<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edorin</title>
  <style>
    /* Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      color: white;
      background-color: black;
      overflow-x: hidden;
    }

    /* Navbar */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 2rem;
      z-index: 1000;
      border-bottom: 2px solid #ffcc00;
    }

    .logo {
      display: flex;
      align-items: center;
      font-size: 1.2rem;
      font-weight: bold;
    }

    .logo img {
      width: 28px;
      height: 28px;
      margin-right: 8px;
    }

    .nav-links {
      list-style: none;
      display: flex;
    }

    .nav-links li {
      margin-left: 2rem;
    }

    .nav-links a {
      text-decoration: none;
      color: white;
      font-size: 1rem;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #ffcc00;
      border-bottom: 2px solid #ffcc00;
      padding-bottom: 4px;
    }

    /* Hero Section */
    .hero {
      height: 100vh;
      width: 100%;
      background: url('https://i.ibb.co/0jrN4vb/hero-bg.jpg') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 0 1rem;
    }

    .hero h1 {
      font-size: 4rem;
      margin-bottom: 1rem;
      font-weight: bold;
    }

    .hero p {
      font-size: 1.5rem;
      font-style: italic;
    }

    /* Scroll Icon */
    .scroll-down {
      position: absolute;
      bottom: 20px;
      font-size: 2rem;
      color: #ffcc00;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      60% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav>
    <div class="logo">
      <img src="https://i.ibb.co/bN40zQc/magic-logo.png" alt="logo" />
      Edorin
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Products</a></li>
      <li><a href="#">Labs</a></li>
      <li><a href="#">About</a></li>
    </ul>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <h1>Edorin</h1>
    <p>"Guiding traders through markets with timeless intelligence."</p>
    <div class="scroll-down">⌄</div>
  </section>
</body>
</html>
